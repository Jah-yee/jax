name: CI - Address Sanitizer (nightly)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 12 * * *" # Daily at 12:00 UTC
  workflow_dispatch: # allows triggering the workflow run manually
  pull_request: # Automatically trigger on pull requests affecting this file
    branches:
      - main
    paths:
      - '.github/workflows/asan.yaml'
permissions: {}

env:
  PYTHON_VERSION: "3.13"
  CPYTHON_URL: "https://storage.googleapis.com/ml-sysroot-testing/python/cpython-3.13.x-asan-shared-linux-x86_64-llvm-18.1.8.tar.gz"
  CPYTHON_SHA256: "cc7354abad5ab5b87aae3c870e510860c9ffefcd3d8f6c3e02129aaf9d30a5bb"
  CPYTHON_PREFIX: "cpython-3.13.x-asan-shared-linux-x86_64-llvm-18.1.8"

jobs:
  asan:
    # Don't execute in fork due to runner type
    if: github.repository == 'jax-ml/jax'
    runs-on: linux-x86-n4-64
    container:
      image: us-docker.pkg.dev/ml-oss-artifacts-published/ml-public-container/ml-build@sha256:ea67e8453d8b09c2ba48853da5e79efef4b65804b4a48dfae4b4da89ffd38405 # ml-build container (based on Ubuntu 22.04)
    strategy:
      fail-fast: false
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: jax
          persist-credentials: false
      - name: Build JAX and run tests
        timeout-minutes: 180
        env:
          ASAN_OPTIONS: detect_leaks=0
          JAX_NUM_GENERATED_CASES: 1
          JAX_ENABLE_X64: true
          JAX_SKIP_SLOW_TESTS: true
          PY_COLORS: 1
          DEBIAN_FRONTEND: noninteractive
        run: |
          set -euo pipefail
          set -x

          cd jax

          echo "ASAN_OPTIONS=${ASAN_OPTIONS}"
          echo "JAX_NUM_GENERATED_CASES=${JAX_NUM_GENERATED_CASES}"
          echo "JAX_ENABLE_X64=${JAX_ENABLE_X64}"
          echo "JAX_SKIP_SLOW_TESTS=${JAX_SKIP_SLOW_TESTS}"

          # A small set of tests to run for quick iteration on changes.
          # test_targets=(
          #   //tests:device_test_cpu
          #   //tests:metadata_test_cpu
          # )
          test_targets=(
            //tests:cpu_tests
            //tests:backend_independent_tests
            //tests/multiprocess:cpu_tests
          )

          echo "Selected ASAN Bazel targets:"
          printf '  %s\n' "${test_targets[@]}"

          bazel test \
              --repo_env=HERMETIC_PYTHON_VERSION="${PYTHON_VERSION}" \
              --repo_env=HERMETIC_PYTHON_URL="${CPYTHON_URL}" \
              --repo_env=HERMETIC_PYTHON_SHA256="${CPYTHON_SHA256}" \
              --repo_env=HERMETIC_PYTHON_PREFIX="${CPYTHON_PREFIX}/" \
              --verbose_failures \
              --test_env=ASAN_OPTIONS="${ASAN_OPTIONS}" \
              --test_env=JAX_NUM_GENERATED_CASES="${JAX_NUM_GENERATED_CASES}" \
              --test_env=JAX_ENABLE_X64="${JAX_ENABLE_X64}" \
              --test_env=JAX_SKIP_SLOW_TESTS="${JAX_SKIP_SLOW_TESTS}" \
              --test_env=PY_COLORS="${PY_COLORS}" \
              --test_output=errors \
              --test_timeout=1800 \
              --config=rbe_linux_x86_64 \
              --config=asan_shared \
              --test_tag_filters=-noasan \
              --remote_download_regex='.*test\.xml$' \
              --show_progress_rate_limit=3 \
              "${test_targets[@]}"

          ci/utilities/collect_bazel_test_xmls.sh test-artifacts

      - name: Upload test artifacts
        if: always()
        continue-on-error: true
        uses: ./jax/.github/actions/upload-test-artifacts
        with:
          test-artifacts-dir: jax/test-artifacts
          artifact-name: bazel-test-artifacts-asan-py${{ env.PYTHON_VERSION }}